name: Pull Request Performance Comparison

on:
  pull_request:
    branches: [ main ]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/benchmark-pr.yml'

jobs:
  compare-performance:
    name: Compare Re vs Standard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout PR Branch
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Download Main Baseline
        run: |
          # Try to download the baseline from gh-pages.
          # Use --fail to handle cases where the file doesn't exist yet.
          curl --fail -sL https://raw.githubusercontent.com/${{ github.repository }}/gh-pages/benchmarks/baseline/benchmark-main.txt -o benchmark-main.txt || touch benchmark-main.txt

      - name: Run Candidate Benchmarks (PR)
        run: |
          cd internal/benchmark
          go test -bench BenchmarkSynthetic -benchmem -tags goregexp,goregexpre -count 5 | tee ../../benchmark-pr.txt

      - name: Relative Performance Analysis
        run: |
          echo "### 📊 Performance Comparison Summary" > pr_comment.md
          echo "To cancel out CI runner noise, we use the standard library as a reference clock." >> pr_comment.md

          if [ -s benchmark-main.txt ]; then
            # Filter baseline to only include what we measured in PR
            grep "BenchmarkSynthetic" benchmark-main.txt > filtered-main.txt || touch filtered-main.txt
          fi

          if [ -s filtered-main.txt ]; then
            echo "#### 1. Delta Analysis (Main vs PR)" >> pr_comment.md
            echo "Comparison of both engines between \`main\` and this \`PR\`. If \`GoRegexpRe\` slows down more than \`GoRegexp\`, it's a regression." >> pr_comment.md
            echo '```' >> pr_comment.md
            # Direct comparison shows how each engine's performance changed
            go tool benchstat filtered-main.txt benchmark-pr.txt | tee delta.txt >> pr_comment.md
            echo '```' >> pr_comment.md

            # Regression Detection Logic
            if grep "GoRegexpRe/" delta.txt | grep -E "\+([1-9][0-9]|[1-9][0-9][0-9]+)\.[0-9]+%" | grep -v "~" | grep -q "p="; then
              echo "REGRESSION_DETECTED=true" >> $GITHUB_ENV
            fi
          fi

          echo "#### 2. Speedup Factor (vs Standard Library)" >> pr_comment.md
          echo "How much faster our engine is compared to \`regexp\` in this PR." >> pr_comment.md
          echo '<details><summary>Click to view detailed PR ratios</summary>' >> pr_comment.md
          echo '' >> pr_comment.md
          echo '```' >> pr_comment.md
          go tool benchstat -col /GoRegexp/GoRegexpRe benchmark-pr.txt | tee comparison-pr.txt >> pr_comment.md
          echo '```' >> pr_comment.md
          echo '</details>' >> pr_comment.md

          if [ -s filtered-main.txt ]; then
            echo '<details><summary>Click to view detailed Main ratios (Baseline)</summary>' >> pr_comment.md
            echo '' >> pr_comment.md
            echo '```' >> pr_comment.md
            go tool benchstat -col /GoRegexp/GoRegexpRe filtered-main.txt | tee comparison-main.txt >> pr_comment.md
            echo '```' >> pr_comment.md
            echo '</details>' >> pr_comment.md
          fi
      - name: Add Warning to Comment
        if: env.REGRESSION_DETECTED == 'true'
        run: |
          # Prepend a warning to the comment file
          SED_TMP=$(mktemp)
          echo "## ⚠️ WARNING: Performance Regression Detected!" > $SED_TMP
          echo "Some benchmarks for \`GoRegexpRe\` showed a significant slowdown (> 10%) compared to \`main\`. Please review the Delta Analysis below." >> $SED_TMP
          echo "" >> $SED_TMP
          cat pr_comment.md >> $SED_TMP
          mv $SED_TMP pr_comment.md

          # Mark as failed in step summary as well
          echo "::error::Performance regression detected in PR benchmarks."

      - name: Finalize Summary
        run: cat pr_comment.md >> $GITHUB_STEP_SUMMARY
      - name: Post PR Comment
        uses: thollander/actions-comment-pull-request@v3
        with:
          file-path: pr_comment.md
          comment-tag: benchmark-results

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmark-main.txt
            benchmark-pr.txt
            comparison-main.txt
            comparison-pr.txt
            delta.txt
