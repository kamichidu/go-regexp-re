name: Pull Request Performance Comparison

on:
  pull_request:
    branches: [ main ]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/benchmark-pr.yml'

jobs:
  compare-performance:
    name: Compare Re vs Standard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout PR Branch
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Download Main Baseline
        run: |
          # Try to download the baseline from gh-pages.
          # Use --fail to handle cases where the file doesn't exist yet.
          curl --fail -sL https://raw.githubusercontent.com/${{ github.repository }}/gh-pages/benchmarks/baseline/benchmark-main.txt -o benchmark-main.txt || touch benchmark-main.txt

      - name: Run Candidate Benchmarks (PR)
        run: |
          cd internal/benchmark
          # Run all benchmarks to ensure broad coverage of regex features
          go test -bench . -benchmem -tags goregexp,goregexpre -count 5 | tee ../../benchmark-pr.txt

      - name: Relative Performance Analysis
        run: |
          echo "### 📊 Performance Regression Analysis" > pr_comment.md
          echo "This report evaluates performance changes relative to the standard library and the current \`main\` branch baseline." >> pr_comment.md

          # Convert raw benchmarks to relative ratios (Re/Std)
          ./_scripts/bench-ratio.sh < benchmark-main.txt > main-ratio.txt
          ./_scripts/bench-ratio.sh < benchmark-pr.txt > pr-ratio.txt

          # 1. Delta Analysis (Previous vs Current)
          if [ -s main-ratio.txt ]; then
            echo "#### Speedup Factor Delta (Main vs PR)" >> pr_comment.md
            echo "Lower percentage means the PR is **faster relative to standard library** than main was." >> pr_comment.md
            echo '```' >> pr_comment.md
            go tool benchstat main-ratio.txt pr-ratio.txt | tee delta.txt >> pr_comment.md
            echo '```' >> pr_comment.md
          fi

          # 2. Absolute Analysis (Standard vs Re)
          echo "#### Current Speedup (Standard vs Ours)" >> pr_comment.md
          echo '<details><summary>Click to view current speedup details</summary>' >> pr_comment.md
          echo '' >> pr_comment.md
          echo '```' >> pr_comment.md
          go tool benchstat -col /GoRegexp/GoRegexpRe benchmark-pr.txt >> pr_comment.md
          echo '```' >> pr_comment.md
          echo '</details>' >> pr_comment.md

          # 3. Regression Detection
          chmod +x _scripts/check-regression.sh
          if ./_scripts/check-regression.sh pr-ratio.txt main-ratio.txt; then
            echo "REGRESSION_DETECTED=false" >> $GITHUB_ENV
          else
            echo "REGRESSION_DETECTED=true" >> $GITHUB_ENV
          fi

      - name: Add Warning to Comment
        if: env.REGRESSION_DETECTED == 'true'
        run: |
          # Prepend a warning to the comment file
          SED_TMP=$(mktemp)
          echo "## ⚠️ WARNING: Performance Regression Detected!" > $SED_TMP
          echo "Some benchmarks for \`GoRegexpRe\` showed a significant slowdown (> 10%) compared to \`main\`. Please review the Delta Analysis below." >> $SED_TMP
          echo "" >> $SED_TMP
          cat pr_comment.md >> $SED_TMP
          mv $SED_TMP pr_comment.md

          # Mark as failed in step summary as well
          echo "::error::Performance regression detected in PR benchmarks."

      - name: Finalize Summary
        run: cat pr_comment.md >> $GITHUB_STEP_SUMMARY
      - name: Post PR Comment
        uses: thollander/actions-comment-pull-request@v3
        with:
          file-path: pr_comment.md
          comment-tag: benchmark-results

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmark-main.txt
            benchmark-pr.txt
            comparison-main.txt
            comparison-pr.txt
            main-ratio.txt
            pr-ratio.txt
            delta.txt
