name: Benchmark Performance Tracking

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  benchmark:
    name: Run and Track Benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          # pkg-config is required for CGO to find libraries
          sudo apt-get install -y pkg-config libre2-dev libhyperscan-dev libpcre2-dev

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Run internal/benchmark
        run: |
          cd internal/benchmark
          # Run benchmarks with cgo_engines tag to enable all CGO-based engine comparisons.
          # count=5 for statistical stability.
          go test -v -bench . -benchmem -tags "re2_cgo cgo_engines" -count=5 | tee ../../benchmark-results.txt

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: go-regexp-re Benchmark
          tool: 'go'
          output-file-path: benchmark-results.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          summary-always: true
