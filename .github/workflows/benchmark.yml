name: Benchmark Performance Tracking

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  benchmark:
    name: Run and Track Benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Run Full Audit Benchmarks
        run: |
          cd internal/benchmark
          # Run both engines in one go for precise comparison
          go test -bench . -benchmem -tags goregexp,goregexpre -count 5 | tee ../../benchmark-main.txt

      - name: Compare results
        run: |
          # Use -col to show Standard vs Ours in the summary
          go tool benchstat -col /GoRegexp/GoRegexpRe benchmark-main.txt | tee comparison.txt

          echo "### 📊 Official Benchmark Audit: Go Standard vs go-regexp-re" >> $GITHUB_STEP_SUMMARY
          echo "This report shows the official performance metrics of the \`main\` branch." >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat comparison.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Deploy Baseline, History and Visualization to gh-pages
        run: |
          # Checkout gh-pages in a separate directory
          git clone --depth 1 --branch gh-pages https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git gh-pages

          # 1. Update Latest Baseline
          mkdir -p gh-pages/benchmarks/baseline
          cp benchmark-main.txt gh-pages/benchmarks/baseline/benchmark-main.txt

          # 2. Add to History
          mkdir -p gh-pages/benchmarks/history
          TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
          SHORT_SHA=$(git rev-parse --short HEAD)
          HISTORY_FILE="benchmark-${TIMESTAMP}-${SHORT_SHA}.txt"
          cp benchmark-main.txt gh-pages/benchmarks/history/${HISTORY_FILE}

          # 3. Process Visualizations (Backfill + Indexing)
          mkdir -p gh-pages/data
          _scripts/update-visualization.sh "gh-pages/benchmarks/history" "gh-pages/data"

          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add benchmarks/baseline/benchmark-main.txt
          git add benchmarks/history/*.txt
          git add benchmarks/history/*.json
          git add data/*.json

          # Only commit and push if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "Update benchmark results and visualization: ${SHORT_SHA}"
            git push origin gh-pages
          else
            echo "No changes in benchmark results."
          fi
      - name: Upload results as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmark-main.txt
            comparison.txt
