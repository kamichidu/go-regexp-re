name: Benchmark Performance Tracking

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  benchmark:
    name: Run and Track Benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Run Go standard regexp benchmark
        run: |
          cd internal/benchmark
          go test -bench . -benchmem -tags goregexp -count 5 > ../../benchmark-std.txt

      - name: Run go-regexp-re benchmark
        run: |
          cd internal/benchmark
          go test -bench . -benchmem -tags goregexpre -count 5 > ../../benchmark-re.txt

      - name: Compare results
        run: |
          go tool benchstat benchmark-std.txt benchmark-re.txt > comparison.txt
          echo "### Benchmark Comparison: Go Standard vs go-regexp-re" >> $GITHUB_STEP_SUMMARY
          echo "The following comparison uses \`benchstat\` to show the performance difference." >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat comparison.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmark-std.txt
            benchmark-re.txt
            comparison.txt
